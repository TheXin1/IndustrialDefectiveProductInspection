spring:
  application:
    name: IndustrialDefectiveProductInspection
  datasource:
    url: jdbc:mysql://localhost:3306/industrial_inspection?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.example.industrialdefectiveproductinspection.domain
  configuration:
    map-underscore-to-camel-case: true
